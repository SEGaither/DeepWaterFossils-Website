name: deployment-checks

on:
  push:
    branches:
      - main

jobs:
  repo-structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required files
        run: |
          test -f index.html
          test -f style.css
          test -d images

  vercel-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Pass deployment check
        run: echo "Vercel build check passed"
